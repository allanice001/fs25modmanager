name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # tauri::generate_context! embeds the frontend dist at compile time, so a
      # placeholder is enough to let `cargo test`/clippy build without a full
      # frontend build.
      - name: Stub frontend dist
        run: mkdir -p dist && echo '<!doctype html><title>ci</title>' > dist/index.html

      - name: Format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Typecheck
        run: pnpm run typecheck
      - name: Unit tests
        run: pnpm test
