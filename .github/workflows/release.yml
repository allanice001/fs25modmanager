name: release

# Builds native bundles for Windows and macOS and attaches them to a draft
# GitHub Release. Trigger by pushing a version tag (e.g. `git tag v0.1.0 &&
# git push origin v0.1.0`), or run manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (add these as repo secrets; ignored on
          # Windows). APPLE_CERTIFICATE = base64 of your exported Developer ID
          # .p12; APPLE_SIGNING_IDENTITY = "Developer ID Application: … (TEAMID)".
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Auto-updater signing (the key has no password).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FS25 Mod Manager ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # The code repo is private, so the Tauri updater (which fetches unauthenticated)
  # can't read its release assets. Mirror the built installers + a URL-rewritten
  # latest.json to a PUBLIC releases repo that the updater endpoint points at.
  mirror:
    needs: build
    runs-on: ubuntu-latest
    # Draft releases are only visible to a token with push access, so the
    # GITHUB_TOKEN used below must have contents:write to find the draft.
    permissions:
      contents: write
    steps:
      - name: Download assets from the private draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p out
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          # `gh release download` can't resolve drafts by tag, so find the
          # release (incl. drafts) via the API and pull each asset by id.
          REL=$(gh api "repos/$REPO/releases" --paginate \
            --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -1)
          echo "release id: $REL"
          if [ -z "$REL" ]; then
            echo "::error::no release found for tag $TAG (is the draft visible to this token?)"
            exit 1
          fi
          gh api "repos/$REPO/releases/$REL/assets" --paginate \
            --jq '.[] | "\(.id)\t\(.name)"' | while IFS=$'\t' read -r id name; do
            echo "downloading $name"
            gh api "repos/$REPO/releases/assets/$id" \
              -H "Accept: application/octet-stream" > "out/$name"
          done
          ls -la out

      - name: Point latest.json at the public releases repo
        run: |
          sed -i \
            's#/${{ github.repository }}/releases/download/#/allanice001/fs25modmanager-releases/releases/download/#g' \
            out/latest.json
          echo "--- rewritten latest.json ---"; cat out/latest.json

      - name: Publish to the public releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo allanice001/fs25modmanager-releases >/dev/null 2>&1; then
            gh release upload "$TAG" out/* --repo allanice001/fs25modmanager-releases --clobber
          else
            gh release create "$TAG" out/* \
              --repo allanice001/fs25modmanager-releases \
              --title "FS25 Mod Manager $TAG" \
              --notes "Auto-update artifacts for FS25 Mod Manager. Source code: https://github.com/allanice001/fs25modmanager" \
              --latest
          fi
